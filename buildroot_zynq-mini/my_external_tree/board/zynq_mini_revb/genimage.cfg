image boot.vfat {
	vfat {
		# Список файлов, которые попадут в корень FAT-партиции.
		# Если эту секцию НЕ указать (или закомментировать),
		# genimage делает fallback на --rootpath (=target dir) и
		# пытается записать в FAT весь rootfs → mcopy падает с
		# "Disk full".
		files = {
			"BOOT.BIN",
			"uImage",
			"zynq-mini-revb.dtb",
			"uEnv.txt",
		}
		# КРИТИЧЕСКИ ВАЖНО: '-F 32' заставляет mkfs.fat создать
		# именно FAT32, а не FAT16. По умолчанию для тома 32 MiB
		# mkfs.fat выбирает FAT16 (минимум для FAT32 — 65525
		# кластеров). В нашем MBR раздел помечен типом 0x0C
		# (W95 FAT32 LBA), и Zynq BootROM применяет к нему
		# FAT32-парсер. Если внутри окажется FAT16-BPB —
		# BootROM не сможет найти BOOT.BIN, и плата зависает
		# ДО включения UART (FSBL даже не загружается, DONE-LED
		# не загорается).
		extraargs = "-F 32"
		# label на разделе — удобно при ручной проверке `lsblk`.
		label = "BOOT"
	}
	# 64 MiB — минимум для корректного FAT32 с дефолтным размером
	# кластера. На 32 MiB mkfs.fat сам ругается «Number of clusters
	# for 32 bit FAT is less then suggested minimum» и mcopy потом
	# падает с «Disk full» из-за оверхеда FAT-таблицы. Реально нам
	# нужно ≈18 MiB (BOOT.BIN + uImage + dtb + uEnv.txt), запас огромный.
	size = 64M
}

image rootfs.ext4 {
	# genimage(1) для типа `ext4` вызывает именно `genext2fs`, а не
	# mkfs.ext4 от e2fsprogs. У genext2fs другой набор опций — флаги
	# вроде "-O ^metadata_csum,^64bit" mkfs.ext4-style он не понимает
	# и падает с "invalid option -- 'O'". Поэтому extraargs опущены —
	# всё нужное (block-count, bytes-per-inode) genimage вычислит сам.
	ext4 {
	}
	mountpoint = "/"
	size = 256M
}

image sdcard.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
